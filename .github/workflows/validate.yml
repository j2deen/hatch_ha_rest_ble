name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "0 4 * * 0"
  workflow_dispatch:

jobs:
  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
          # "brands" requires a home-assistant/brands submission; only needed
          # for inclusion in the HACS default store. Remove when submitting.
          ignore: brands
